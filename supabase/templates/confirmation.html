<!--
  Confirm signup email. Renders the 6-digit OTP ({{ .Token }}) the user
  enters on the "Check your email" screen. Email clients don't support CSS
  variables, so brand colors are hardcoded here (navy #0F1F3D, teal #00C2A8,
  cloud #F4F6F8, ink #5B6B82) — this file is the one sanctioned exception to
  the app-wide "no hardcoded hex" rule.
-->
<!DOCTYPE html>
<html lang="en">
  <body style="margin:0; padding:0; background-color:#F4F6F8; font-family:'Hanken Grotesk', Arial, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F4F6F8; padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color:#FFFFFF; border-radius:16px; overflow:hidden;">
            <tr>
              <td style="background-color:#0F1F3D; padding:32px 24px; text-align:center;">
                <div style="font-family:'Space Grotesk', Arial, sans-serif; font-weight:700; font-size:22px; letter-spacing:-0.02em;">
                  <span style="color:#FFFFFF;">Warranty</span><span style="color:#00C2A8;">Buddy</span>
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:32px 32px 24px; text-align:center;">
                <h1 style="margin:0 0 8px; font-family:'Space Grotesk', Arial, sans-serif; font-size:20px; color:#0F1F3D;">
                  Verify your email
                </h1>
                <p style="margin:0 0 24px; font-size:14px; line-height:1.6; color:#5B6B82;">
                  Enter this code to finish creating your account:
                </p>
                <div style="display:inline-block; background-color:#F4F6F8; border-radius:12px; padding:16px 32px; font-family:'Space Grotesk', Arial, sans-serif; font-size:32px; font-weight:700; letter-spacing:0.3em; color:#0F1F3D;">
                  {{ .Token }}
                </div>
                <p style="margin:24px 0 0; font-size:12px; line-height:1.6; color:#5B6B82;">
                  This code expires in 1 hour. If you didn't create a WarrantyBuddy account, you can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
